<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Intercom Desk</title><style>

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:100%;
max-width:440px;
padding:20px;
}

.card{
background:#111827;
padding:28px;
border-radius:16px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

h1{
margin:0 0 20px 0;
font-size:22px;
}

label{
font-size:13px;
opacity:.8;
display:block;
margin-top:12px;
}

select,textarea,input{

width:100%;
margin-top:6px;
padding:12px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
font-size:14px;

}

textarea{
min-height:80px;
resize:none;
}

button{

width:100%;
margin-top:14px;
padding:12px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;

}

button:hover{
background:#4f46e5;
}

.result{
margin-top:14px;
font-size:14px;
}

.success{
background:#064e3b;
padding:12px;
border-radius:8px;
margin-top:12px;
}

.statusCard{
background:#1f2937;
padding:12px;
border-radius:8px;
margin-top:10px;
}

hr{
margin:24px 0;
border:0;
border-top:1px solid #2a2a2a;
}

</style></head><body><div class="wrapper"><div class="card"><h1>Intercom Desk</h1><label>Category</label>
<select id="category"></select>

<label>Sub Issue</label>
<select id="subIssue"></select>

<label>Description</label>

<textarea id="description" placeholder="Describe your issue"></textarea><button id="submitBtn" onclick="submitComplaint()">Submit Complaint</button>

<div id="result" class="result"></div><hr><label>Check Complaint Status</label>

<input id="ticketId" placeholder="Enter reference ID"><button onclick="checkStatus()">Check Status</button>

<div id="statusResult"></div></div></div><script src="app.js"></script></body>
</html>
